<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Circuit Diagram Maker Logo</title>
  <desc id="desc">Hexagonal circuit logo with a central node and connection traces.</desc>
  <defs>
    <linearGradient id="brandGradient" x1="16" y1="12" x2="112" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b82f6" />
      <stop offset="1" stop-color="#22d3ee" />
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="28" fill="#08111d" />
  <path d="M64 16 100 36v40L64 96 28 76V36Z" fill="none" stroke="url(#brandGradient)" stroke-width="6" stroke-linejoin="round" />
  <circle cx="64" cy="62" r="12" fill="url(#brandGradient)" filter="url(#softGlow)" />
  <path d="M42 48 64 62 86 48M64 62v28" fill="none" stroke="url(#brandGradient)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
</svg>
